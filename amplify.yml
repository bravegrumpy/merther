version: 1
frontend:
  phases:
    preBuild:
      commands:
        - 'echo "installing dependancies..."'
        - 'npm ci --cache .npm --prefer-offline'
        - 'npm install'
        - 'npm list'
        - 'env >> .env'
    build:
      commands:
        - 'npm run build'
  artifacts: 
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - '.npm/**/*'
      - 'node_modules/**/*'