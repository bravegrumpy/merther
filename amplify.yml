version: 1
frontend:
  phases:
    preBuild:
      commands:
        - 'echo "installing dependancies..."'
        - 'npm ci --cache .npm --prefer-offline'
        - 'npm list'
    build:
      commands:
        - 'npm run build'
        - mv node_modules ./.amplify-hosting/compute/default
  artifacts: 
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - '.npm/**/*'
      - 'node_modules/**/*'