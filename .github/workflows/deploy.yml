on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
          node-version: [22]
    name: deploy2nekoweb
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with: 
          version: 10
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      
      - name: Install Dependancies
        run: pnpm install
      
      - name: Build Artifacts
        run: pnpm build:ssg
      
      - name: Cleanup
        run: pnpm reset

      - name: deploy2nekoweb
        uses: indiefellas/deploy2nekoweb@main
        with: 
          nekoweb-api-key: ${{ secrets.NEKOWEB_API_KEY }}
          nekoweb-domain: 'bravegrumpy.nekoweb.org'
          nekoweb-username: 'bravegrumpy'
          directory: 'dist'